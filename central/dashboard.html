<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge Computing Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
        }

        .metric-label {
            font-weight: bold;
            color: #555;
        }

        .metric-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
        }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .status-healthy {
            background: #4caf50;
            color: white;
        }

        .status-warning {
            background: #ff9800;
            color: white;
        }

        .status-error {
            background: #f44336;
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .stat-box .value {
            font-size: 1.8em;
            font-weight: bold;
            margin-top: 5px;
        }

        .refresh-info {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .error-message {
            color: #f44336;
            padding: 10px;
            background: #ffebee;
            border-radius: 5px;
            margin: 10px 0;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖥️ Edge Computing System Dashboard</h1>

        <!-- 🔥 SUMMARY -->
        <div class="grid">
            <div class="stat-box">
                <div class="label">Total Nodes</div>
                <div class="value" id="total-nodes">-</div>
            </div>
            <div class="stat-box">
                <div class="label">Total Tasks</div>
                <div class="value" id="total-tasks">-</div>
            </div>
            <div class="stat-box">
                <div class="label">Avg CPU</div>
                <div class="value" id="avg-cpu">-</div>
            </div>
        </div>

        <div id="gateway-card" class="card">
            <h2>Central Gateway</h2>
            <div id="gateway-content" class="loading">⏳ Fetching gateway...</div>
        </div>

        <!-- 🔥 DISTRIBUTION -->
        <div class="card">
            <h2>📊 Task Distribution</h2>
            <div id="distribution"></div>
        </div>

        <!-- 🔥 NODES -->
        <div class="grid" id="nodes-grid">
            <div class="loading">⏳ Fetching nodes...</div>
        </div>

        <div class="refresh-info">
            <p>Auto-refreshing every 2 seconds...</p>
            <p id="last-update">Last update: Never</p>
        </div>
    </div>
    
    <script>
        const CENTRAL_IP = "192.168.56.109";
        const CENTRAL_PORT = 8000;
        const GATEWAY_URL = `http://${CENTRAL_IP}:${CENTRAL_PORT}`;

        async function updateDashboard() {
            try {
                const response = await fetch(`${GATEWAY_URL}/nodes/status`);
                const data = await response.json();

                updateGatewayCard();
                updateNodesGrid(data.nodes);
                updateSummary(data.nodes);
                updateDistribution(data.nodes);

                const now = new Date().toLocaleTimeString();
                document.getElementById('last-update').textContent = `Last update: ${now}`;

            } catch (error) {
                console.error(error);
                document.getElementById('nodes-grid').innerHTML =
                    `<div class="error-message">⚠️ ${error.message}</div>`;
            }
        }

        async function updateGatewayCard() {
            try {
                const res = await fetch(`${GATEWAY_URL}/health`);
                const data = await res.json();

                document.getElementById('gateway-content').innerHTML = `
                    <div class="metric">
                        <span>Status</span>
                        <span class="status-badge status-healthy">✓ ${data.status}</span>
                    </div>
                    <div class="metric">
                        <span>URL</span>
                        <span>${GATEWAY_URL}</span>
                    </div>
                `;
            } catch {
                document.getElementById('gateway-content').innerHTML =
                    `<div class="error-message">Gateway Error</div>`;
            }
        }

        function updateSummary(nodes) {
            const list = Object.values(nodes);

            const totalNodes = list.length;
            const totalTasks = list.reduce((s, n) => s + n.tasks_count, 0);
            const avgCPU = list.reduce((s, n) => s + n.cpu_usage, 0) / totalNodes;

            document.getElementById("total-nodes").textContent = totalNodes;
            document.getElementById("total-tasks").textContent = totalTasks;
            document.getElementById("avg-cpu").textContent = avgCPU.toFixed(1) + "%";
        }

        function updateDistribution(nodes) {
            let html = "";

            for (const n of Object.values(nodes)) {
                html += `
                    <div class="metric">
                        <span>${n.node_id}</span>
                        <span>${n.tasks_count} tasks</span>
                    </div>
                `;
            }

            document.getElementById("distribution").innerHTML = html;
        }

        function updateNodesGrid(nodes) {
            const grid = document.getElementById('nodes-grid');
            let html = '';

            for (const n of Object.values(nodes)) {

                const cpu = n.cpu_usage.toFixed(1);
                const mem = n.memory_usage.toFixed(1);

                const cpuColor =
                    n.cpu_usage > 80 ? "#f44336" :
                    n.cpu_usage > 50 ? "#ff9800" :
                    "#4caf50";

                html += `
                    <div class="card">
                        <h2>${n.node_id}</h2>

                        <div class="metric">
                            <span>Status</span>
                            <span class="status-badge status-healthy">✓ ${n.status}</span>
                        </div>

                        <div class="metric">
                            <span>CPU</span>
                            <span>${cpu}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${cpu}%; background:${cpuColor}">
                                ${cpu}%
                            </div>
                        </div>

                        <div class="metric">
                            <span>Memory</span>
                            <span>${mem}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${mem}%">
                                ${mem}%
                            </div>
                        </div>

                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="label">Queue</div>
                                <div class="value">${n.tasks_count}</div>
                            </div>
                            <div class="stat-box">
                                <div class="label">Heartbeat</div>
                                <div class="value">${getTimeAgo(n.last_heartbeat)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            grid.innerHTML = html;
        }

        function getTimeAgo(timestamp) {
            if (!timestamp) return "N/A";

            const then = new Date(timestamp + "Z");
            if (isNaN(then)) return "invalid";

            const now = new Date();
            const sec = Math.floor((now - then) / 1000);

            if (sec < 60) return sec + "s ago";
            if (sec < 3600) return Math.floor(sec / 60) + "m ago";
            return Math.floor(sec / 3600) + "h ago";
        }

        updateDashboard();
        setInterval(updateDashboard, 2000);
    </script>
</body>
</html>
